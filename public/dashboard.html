<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DvWilkerOFC HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .user-info span {
            color: #888;
        }
        .user-info .username {
            color: #fff;
            font-weight: 600;
        }
        .coins-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }
        .menu-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .menu-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 0;
            min-width: 200px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-menu.active {
            display: block;
        }
        .dropdown-menu a, .dropdown-menu button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: #fff;
            text-decoration: none;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .dropdown-menu a:hover, .dropdown-menu button:hover {
            background: rgba(255,255,255,0.1);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #000;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-danger {
            background: rgba(255,0,0,0.2);
            color: #ff4444;
            border: 1px solid rgba(255,0,0,0.3);
        }
        .btn:hover { transform: translateY(-2px); }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card h3 {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }
        .stat-card .value.green { color: #00ff88; }
        .stat-card .value.blue { color: #00d4ff; }
        .servers-grid {
            display: grid;
            gap: 20px;
        }
        .server-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .server-card:hover {
            border-color: #00d4ff;
            background: rgba(255,255,255,0.08);
        }
        .server-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .server-info p {
            color: #888;
            font-size: 14px;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.running {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }
        .status-badge.offline {
            background: rgba(255,255,255,0.1);
            color: #888;
        }
        .server-actions {
            display: flex;
            gap: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.03);
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        .empty-state i {
            font-size: 50px;
            color: #333;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }
        .empty-state p {
            color: #555;
            margin-bottom: 20px;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
        }
        .modal-content h2 {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .form-group small {
            color: #666;
            font-size: 12px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🚀 DvWilkerOFC HOST</div>
        <div class="user-info">
            <span>Plan: <strong id="userPlan">-</strong></span>
            <span class="coins-badge">
                <i class="fas fa-coins"></i> <span id="userCoins">0</span> Coins
            </span>
            <span class="username" id="username">-</span>
            <button class="menu-btn" onclick="toggleMenu()">
                <i class="fas fa-ellipsis-v"></i>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="/dashboard">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="/shop">
                    <i class="fas fa-shopping-cart"></i> Shop
                </a>
                <a href="/soporte">
                    <i class="fas fa-headset"></i> Soporte
                </a>
                <a href="/admin" id="adminLink" style="display: none;">
                    <i class="fas fa-crown"></i> Panel Admin
                </a>
                <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;">
                <button onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>🖥️ Mis Servidores</h1>
            <button class="btn btn-primary" onclick="openCreateModal()">
                <i class="fas fa-plus"></i> Crear Servidor
            </button>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <h3>Servidores</h3>
                <div class="value blue" id="serverCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Online</h3>
                <div class="value green" id="onlineCount">0</div>
            </div>
            <div class="stat-card">
                <h3>RAM Disponible</h3>
                <div class="value" id="ramAvailable">-</div>
            </div>
        </div>

        <div class="servers-grid" id="serversList">
            <div class="empty-state">
                <i class="fas fa-server"></i>
                <h3>No tienes servidores</h3>
                <p>Crea tu primer servidor para comenzar</p>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <i class="fas fa-plus"></i> Crear Servidor
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Crear Servidor -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <h2><i class="fab fa-github"></i> Crear Servidor</h2>
            <form id="createForm">
                <div class="form-group">
                    <label>Nombre del servidor</label>
                    <input type="text" id="serverName" required placeholder="Mi Bot WhatsApp">
                </div>
                <div class="form-group">
                    <label>URL del repositorio GitHub</label>
                    <input type="url" id="repoUrl" required placeholder="https://github.com/usuario/repo">
                    <small>El repositorio debe ser público</small>
                </div>
                <div class="form-group">
                    <label>Archivo principal</label>
                    <input type="text" id="mainFile" value="index.js" placeholder="index.js">
                    <small>El archivo que se ejecutará con Node.js</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="createBtn">
                        <i class="fas fa-clone"></i> Clonar y Crear
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };

        // Cargar datos del usuario
        async function loadUser() {
            try {
                const res = await fetch('/api/auth/me', { headers });
                const user = await res.json();
                document.getElementById('username').textContent = user.username;
                document.getElementById('userPlan').textContent = user.plan.toUpperCase();
                document.getElementById('userCoins').textContent = user.coins || 0;
                
                // Mostrar enlace admin si es admin
                if (user.isAdmin) {
                    const adminLink = document.getElementById('adminLink');
                    adminLink.style.display = 'flex';
                    adminLink.href = '/admin';
                }
            } catch (err) {
                logout();
            }
        }
        
        // Toggle menú desplegable
        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('active');
        }
        
        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('dropdownMenu');
            const menuBtn = e.target.closest('.menu-btn');
            if (!menuBtn && !e.target.closest('.dropdown-menu')) {
                menu.classList.remove('active');
            }
        });

        // Cargar servidores
        async function loadServers() {
            try {
                const res = await fetch('/api/server/list', { headers });
                const data = await res.json();
                
                document.getElementById('serverCount').textContent = data.servers.length;
                document.getElementById('onlineCount').textContent = data.servers.filter(s => s.status === 'running').length;
                document.getElementById('ramAvailable').textContent = `${data.limits.ram} MB`;
                
                const container = document.getElementById('serversList');
                
                if (data.servers.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-server"></i>
                            <h3>No tienes servidores</h3>
                            <p>Crea tu primer servidor para comenzar</p>
                            <button class="btn btn-primary" onclick="openCreateModal()">
                                <i class="fas fa-plus"></i> Crear Servidor
                            </button>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.servers.map(server => `
                    <div class="server-card">
                        <div class="server-info">
                            <h3>
                                <span class="status-badge ${server.status}">${server.status === 'running' ? '🟢 Online' : '⚫ Offline'}</span>
                                ${server.name}
                            </h3>
                            <p><i class="fab fa-github"></i> ${server.repoUrl}</p>
                        </div>
                        <div class="server-actions">
                            <a href="/panel?id=${server.id}" class="btn btn-primary">
                                <i class="fas fa-terminal"></i> Panel
                            </a>
                            <button class="btn btn-danger" onclick="deleteServer('${server.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                console.error('Error:', err);
            }
        }

        // Modal
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
        }
        
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        // Crear servidor
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Clonando...';
            
            try {
                const res = await fetch('/api/server/create', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        name: document.getElementById('serverName').value,
                        repoUrl: document.getElementById('repoUrl').value,
                        mainFile: document.getElementById('mainFile').value || 'index.js'
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    closeCreateModal();
                    // Esperar un poco para que clone
                    setTimeout(loadServers, 3000);
                    alert('Servidor creándose... El repositorio se está clonando.');
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Error al crear servidor');
            }
            
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-clone"></i> Clonar y Crear';
        });

        // Eliminar servidor
        async function deleteServer(id) {
            if (!confirm('¿Estás seguro de eliminar este servidor? Se borrarán todos los archivos.')) {
                return;
            }
            
            try {
                const res = await fetch(`/api/server/${id}`, {
                    method: 'DELETE',
                    headers
                });
                
                if (res.ok) {
                    loadServers();
                }
            } catch (err) {
                alert('Error al eliminar');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        // Cargar todo
        loadUser();
        loadServers();
        
        // Actualizar cada 10 segundos
        setInterval(loadServers, 10000);
    </script>
</body>
</html>
