<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - DvWilkerOFC HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #888;
            font-weight: 400;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #000;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        .message.success {
            background: rgba(0,255,0,0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔑</div>
        <h2>Nueva Contraseña</h2>
        
        <div id="message" class="message"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Nueva contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres" minlength="6">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirmar contraseña</label>
                <input type="password" id="confirmPassword" required placeholder="Repite la contraseña">
            </div>
            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-save"></i> Guardar Contraseña
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            message.className = 'message error';
            message.textContent = 'Token no válido';
            message.style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                message.className = 'message error';
                message.textContent = 'Las contraseñas no coinciden';
                message.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    message.className = 'message success';
                    message.innerHTML = '<i class="fas fa-check-circle"></i> Contraseña actualizada. Redirigiendo...';
                    message.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    message.className = 'message error';
                    message.textContent = data.error;
                    message.style.display = 'block';
                }
            } catch (err) {
                message.className = 'message error';
                message.textContent = 'Error de conexión';
                message.style.display = 'block';
            }
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-save"></i> Guardar Contraseña';
        });
    </script>
</body>
</html>
